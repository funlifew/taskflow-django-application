<header class="topbar glass-panel">
  <div class="topbar-inner">
    <div class="topbar__title-group">
      <button class="icon-btn menu-btn" type="button" data-drawer-open aria-label="باز کردن منو">
        <svg class="tf-icon" aria-hidden="true"><use href="#icon-menu"></use></svg>
      </button>
      <div>
        <strong>{% block page_heading %}داشبورد{% endblock page_heading %}</strong>
        <div class="muted topbar__subtitle">نمای یکپارچه‌ی پروژه‌ها و کارها</div>
      </div>
    </div>

    <div class="topbar__actions">
      <button class="icon-btn" type="button" data-theme-toggle aria-label="تغییر تم">
        <svg class="tf-icon" aria-hidden="true"><use data-theme-use href="#icon-moon"></use></svg>
      </button>
      <a class="profile-avatar-sm" href="{% url 'dashboard:profile' %}" aria-label="پروفایل">
        {% if request.user.avatar %}
          <img src="{{ request.user.avatar.url }}" alt="{{ request.user.get_full_name|default:request.user.username }}">
        {% else %}
          <span class="avatar-initials">{{ request.user.first_name|default:request.user.username|slice:':1' }}</span>
        {% endif %}
      </a>
    </div>
  </div>
</header>
