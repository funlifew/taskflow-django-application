<header class="topbar">
    <div class="topbar-inner">
        <div class="inline">
            <button class="icon-btn menu-btn" data-drawer-open>☰</button>
            <div>
                <strong>داشبورد</strong>
                <div class="muted" style="font-size:12px;margin-top:2px">نمای کلی وضعیت کارها</div>
            </div>
        </div>
        <div class="inline">
            <button class="icon-btn" data-theme-toggle aria-label="تغییر تم"><span data-theme-icon>🌙</span></button>
            <a class="profile-avatar-sm" href="accounts/profile_detail.html" aria-label="پروفایل">
                {% if request.user.avatar %}
                <img
                    src="{{ request.user.avatar.url }}"
                    alt="{{ request.user.username }}"
                >
                {% else %}
                <span class="avatar-initials">
                    {{ request.user.first_name|default:request.user.username|slice:":1" }}
                </span>
                {% endif %}
            </a>
        </div>
    </div>
</header>
