<div class="mobile-drawer" data-drawer aria-hidden="true">
  <button class="drawer-backdrop" type="button" data-drawer-close aria-label="بستن منو"></button>

  <aside class="drawer-panel glass-panel" aria-label="منوی موبایل">
    <div class="drawer-panel__head">
      <a class="brand" href="{% url 'dashboard:dashboard' %}">
        <span class="brand-mark" aria-hidden="true"><svg class="tf-icon"><use href="#icon-logo"></use></svg></span>
        <span class="brand-copy"><strong>TaskFlow</strong><small>Workspace OS</small></span>
      </a>
      <button class="icon-btn" type="button" data-drawer-close aria-label="بستن منو">
        <svg class="tf-icon" aria-hidden="true"><use href="#icon-x"></use></svg>
      </button>
    </div>

    <nav class="nav-list">
      <a class="nav-link" data-nav="dashboard" href="{% url 'dashboard:dashboard' %}">
        <svg class="tf-icon"><use href="#icon-home"></use></svg><span>داشبورد</span>
      </a>
      <a class="nav-link" data-nav="workspaces" href="{% url 'workspaces:list' %}">
        <svg class="tf-icon"><use href="#icon-workspace"></use></svg><span>ورک‌اسپیس‌ها</span>
      </a>
      <a class="nav-link" data-nav="boards" href="#">
        <svg class="tf-icon"><use href="#icon-board"></use></svg><span>بردها</span>
      </a>
      <a class="nav-link" data-nav="tasks" href="#">
        <svg class="tf-icon"><use href="#icon-check-square"></use></svg><span>تسک‌ها</span>
      </a>
      <a class="nav-link" data-nav="profile" href="{% url 'dashboard:profile' %}">
        <svg class="tf-icon"><use href="#icon-user"></use></svg><span>پروفایل</span>
      </a>
    </nav>

    <div class="drawer-panel__footer">
      <button class="nav-link" type="button" data-theme-toggle>
        <svg class="tf-icon"><use data-theme-use href="#icon-moon"></use></svg><span>تغییر تم</span>
      </button>
      <form method="post" action="{% url 'accounts:logout' %}">
        {% csrf_token %}
        <button class="nav-link nav-logout" type="submit">
          <svg class="tf-icon"><use href="#icon-logout"></use></svg><span>خروج از حساب</span>
        </button>
      </form>
    </div>
  </aside>
</div>
